- **Right-click** tab → context menu with "Rename" and "Delete" options (don't show delete if only 1 page)

**`usePages` hook:**
```typescript
export function usePages() {
  const [pages, setPages] = useState<Page[]>([]);
  const [currentPageId, setCurrentPageId] = useState<string>('');

  // load from store on mount
  // persist to store on any change

  function addPage(name = 'New Page'): Page { ... }
  function renamePage(id: string, name: string): void { ... }
  function deletePage(id: string): void { ... }
  function switchPage(id: string): void { ... }
  function currentPage(): Page | undefined { ... }

  return { pages, currentPageId, currentPage, addPage, renamePage, deletePage, switchPage };
}
```

**Store persistence:** Save pages array + currentPageId together on every change (debounced 400ms). On app start, restore both. If store is empty, initialize with default pages.

**Reminder scope:** Reminders are per-task, not per-page. A reminder set on a task in "To-Do" will still fire even when you're viewing a different page. The toast notification should indicate which page the task is on: "⏱ [To-Do] Take meds".

