### CLOCK IN CIRCLE ORNAMENT

The decorative arch/ring at the top-center of the frame is the clock display zone.

**Measured coordinates** (for a 520×624px window, image scaled from 1667×2000):
- Circle ornament center: approximately x=255, y=95
- Clock div: `position: absolute; top: 22px; left: 50%; transform: translateX(-50%); width: 110px; text-align: center; z-index: 20; pointer-events: none;`

**Clock component (`ClockDisplay.tsx`):**
```tsx
export function ClockDisplay() {
  const [time, setTime] = useState('');
  const [date, setDate] = useState('');

  useEffect(() => {
    const tick = () => {
      const now = new Date();
      setTime(`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`);
      setDate(now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }));
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  return (
    <div className="clock-display">
      <div className="clock-time">{time}</div>
      <div className="clock-date">{date}</div>
    </div>
  );
}
```

