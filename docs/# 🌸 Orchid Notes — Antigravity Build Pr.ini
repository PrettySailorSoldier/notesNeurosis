### TRANSPARENT PNG ASSET

The `orchidframe.png` Canva export has a solid RGB background — it needs to be converted to a true RGBA PNG before use. Use this Python script at project setup time:

```python
from PIL import Image
import numpy as np
from collections import deque

img = Image.open('src/assets/orchidframe.png').convert('RGBA')
arr = np.array(img, dtype=np.uint8)
h, w = arr.shape[:2]

visited = np.zeros((h, w), dtype=bool)
queue = deque()

# Seed flood fill from all border pixels that are near-black
for x in range(w):
    for y in [0, h-1]:
        if all(arr[y,x,:3] < 30) and not visited[y,x]:
            queue.append((y,x)); visited[y,x] = True
for y in range(h):
    for x in [0, w-1]:
        if all(arr[y,x,:3] < 30) and not visited[y,x]:
            queue.append((y,x)); visited[y,x] = True

while queue:
    y, x = queue.popleft()
    for dy, dx in [(-1,0),(1,0),(0,-1),(0,1)]:
        ny, nx = y+dy, x+dx
        if 0 <= ny < h and 0 <= nx < w and not visited[ny,nx]:
            if all(arr[ny,nx,:3] < 30):
                visited[ny,nx] = True
                queue.append((ny,nx))

arr[visited, 3] = 0
Image.fromarray(arr).save('src/assets/orchidframe_transparent.png')
print('Done — use orchidframe_transparent.png in your app')
```

Run once: `python3 scripts/make_transparent.py`
Reference `orchidframe_transparent.png` in the app, not the original.

**Measured writing zone** (1667×2000 image, 43.1% of pixels become transparent):
