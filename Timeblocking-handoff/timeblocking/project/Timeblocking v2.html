<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Timeblocking — notesNeurosis</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #0d0818; user-select: none; -webkit-user-select: none; }
  #root { width: 100vw; height: 100vh; }

  :root {
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Crimson Pro', Georgia, serif;
    --font-mono: 'Space Mono', monospace;
    --plum: #661A4E;
    --rose: #B55F7C;
    --peach: #FD8D79;
    --orange: #FCA324;
    --yellow: #FCCD38;
    --blue: #5A8EFC;
    --teal: #2dd4bf;
    --violet: #a78bfa;
  }

  .app-frame {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: fill; pointer-events: none; z-index: 0;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(180,140,220,0.22); border-radius: 2px; }

  /* ── Quick-add ── */
  .quick-add {
    flex-shrink: 0;
    border-radius: 8px 8px 0 0;
    padding: 7px 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .quick-add-row1 { display: flex; align-items: center; gap: 8px; }
  .quick-add-input {
    flex: 1; background: none; border: none; outline: none;
    font-size: 14px; font-style: italic; caret-color: var(--plum);
  }
  .quick-add-input:focus { font-style: normal; }
  .quick-add-start-label { font-size: 11px; letter-spacing: 0.04em; opacity: 0.55; }
  .quick-add-time { display: flex; align-items: center; gap: 5px; }
  .quick-add-time-input {
    border-radius: 4px; font-size: 12px;
    padding: 2px 6px; outline: none;
    font-variant-numeric: tabular-nums; cursor: pointer;
  }
  .quick-add-now-btn {
    border-radius: 4px; font-size: 12px;
    padding: 2px 8px; cursor: pointer; transition: all 0.12s;
  }
  .quick-add-row2 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .duration-pill {
    border-radius: 12px; font-size: 12px;
    padding: 2px 10px; cursor: pointer; transition: all 0.12s; white-space: nowrap;
  }
  .quick-add-arrow { font-size: 12px; margin-left: 2px; font-variant-numeric: tabular-nums; opacity: 0.5; }

  /* ── All-day strip ── */
  .allday-strip {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px;
  }
  .allday-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; border-radius: 3px; padding: 1px 6px; flex-shrink: 0;
  }
  .allday-input {
    flex: 1; background: none; border: none; outline: none;
    font-size: 13px; font-style: italic; caret-color: var(--plum);
  }
  .allday-task-chip {
    display: flex; align-items: center; gap: 4px;
    border-radius: 10px; padding: 1px 8px 1px 6px; font-size: 12px;
    cursor: pointer; transition: all 0.1s;
  }
  .allday-task-chip-x { font-size: 10px; margin-left: 2px; cursor: pointer; opacity: 0.5; }

  /* ── Timeline ── */
  .timeline-wrapper { flex: 1; display: flex; overflow: hidden; }
  .time-gutter { width: 44px; flex-shrink: 0; overflow: hidden; position: relative; }
  .timeline-scroll {
    flex: 1; overflow-y: auto; position: relative;
    scrollbar-width: thin; scrollbar-color: rgba(180,140,220,0.22) transparent;
  }
  .hour-row { position: absolute; left: 0; right: 0; pointer-events: none; }
  .hour-label {
    position: absolute; left: 0; right: 0;
    text-align: right; padding-right: 5px;
    font-size: 10px; font-variant-numeric: tabular-nums;
    transform: translateY(-7px); pointer-events: none;
  }
  .half-tick { position: absolute; right: 0; width: 8px; pointer-events: none; }

  /* ── Now line ── */
  .now-line { position: absolute; left: 0; right: 0; display: flex; align-items: center; gap: 5px; pointer-events: none; z-index: 20; }
  .now-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); flex-shrink: 0; box-shadow: 0 0 6px rgba(90,142,252,0.7); margin-left: -4px; }
  .now-rule { flex: 1; height: 1px; background: linear-gradient(to right, rgba(90,142,252,0.8) 0%, rgba(90,142,252,0.2) 70%, transparent 100%); }
  .now-label { position: absolute; left: 8px; font-size: 9px; font-variant-numeric: tabular-nums; color: var(--blue); font-weight: 700; letter-spacing: 0.04em; background: rgba(90,142,252,0.1); border: 1px solid rgba(90,142,252,0.22); border-radius: 3px; padding: 1px 4px; white-space: nowrap; }

  /* ── Time blocks ── */
  .tblock { position: absolute; left: 4px; right: 8px; border-radius: 6px; border-left: 3px solid transparent; padding: 6px 8px 6px 10px; cursor: default; overflow: hidden; transition: filter 0.12s, background 0.3s, border-color 0.3s; }
  .tblock:hover { filter: brightness(1.07); }
  .tblock.completed { opacity: 0.38; filter: saturate(0.3); }
  .tblock-time { font-size: 10px; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 3px; margin-bottom: 3px; user-select: none; }
  .tblock-time-edit { border-radius: 3px; font-size: 10px; width: 52px; padding: 1px 3px; outline: none; font-variant-numeric: tabular-nums; cursor: pointer; user-select: text; -webkit-user-select: text; }
  .tblock-title { font-family: var(--font-serif); font-size: 15px; font-weight: 600; background: none; border: none; outline: none; width: 100%; padding: 0; line-height: 1.25; user-select: text; -webkit-user-select: text; }
  .tblock-title::placeholder { font-style: italic; font-weight: 400; opacity: 0.4; }
  .tblock.completed .tblock-title { text-decoration: line-through; opacity: 0.5; }
  .tblock-notes { font-size: 12px; background: none; border: none; outline: none; resize: none; width: 100%; padding: 2px 0 0; font-family: var(--font-body); line-height: 1.4; min-height: 0; display: block; user-select: text; -webkit-user-select: text; }
  .tblock-notes::placeholder { font-style: italic; opacity: 0.4; }
  .tblock-tasks { display: flex; flex-direction: column; gap: 3px; margin-top: 5px; }
  .tblock-task-row { display: flex; align-items: center; gap: 5px; }
  .tblock-check { width: 13px; height: 13px; border-radius: 3px; background: transparent; font-size: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.12s; }
  .tblock-task-input { flex: 1; background: none; border: none; border-bottom: 1px dashed transparent; font-family: var(--font-serif); font-size: 13px; padding: 0; outline: none; transition: border-color 0.12s; user-select: text; -webkit-user-select: text; }
  .tblock-task-input.done { text-decoration: line-through; opacity: 0.45; }
  .tblock-task-del { background: none; border: none; font-size: 13px; cursor: pointer; padding: 0 3px; opacity: 0; transition: opacity 0.12s; }
  .tblock-task-row:hover .tblock-task-del { opacity: 1; }
  .tblock-task-del:hover { color: #E74C3C; }
  .tblock-add-task { background: none; border: none; font-family: var(--font-body); font-size: 12px; padding: 1px 0; cursor: pointer; text-align: left; transition: color 0.12s; margin-top: 2px; }
  .tblock-actions { position: absolute; top: 5px; right: 6px; display: flex; align-items: center; gap: 3px; opacity: 0; transition: opacity 0.12s; }
  .tblock:hover .tblock-actions { opacity: 1; }
  .tblock-action { background: none; border: none; cursor: pointer; font-size: 12px; padding: 1px 4px; border-radius: 3px; transition: all 0.1s; line-height: 1; }
  .tblock-now-badge { font-size: 9px; color: var(--blue); font-weight: 700; letter-spacing: 0.03em; animation: blink-pulse 2s ease-in-out infinite; margin-left: 2px; }
  @keyframes blink-pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .color-strip { display: flex; gap: 4px; margin-top: 5px; max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.18s, opacity 0.18s; }
  .tblock:hover .color-strip, .tblock:focus-within .color-strip { max-height: 18px; opacity: 1; }
  .cdot { width: 11px; height: 11px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.15); transition: transform 0.1s; }
  .cdot:hover { transform: scale(1.35); }
  .cdot.active { outline: 2px solid rgba(102,26,78,0.55); outline-offset: 1px; }

  /* ── Sidebar ── */
  .sidebar { position: absolute; top: 8%; right: 1.5%; width: 16%; z-index: 5; display: flex; flex-direction: column; gap: 10px; font-family: var(--font-body); }
  .cal-header { display: flex; align-items: center; justify-content: space-between; }
  .cal-month-title { font-family: var(--font-serif); font-size: 15px; font-weight: 600; }
  .cal-nav { display: flex; align-items: center; gap: 2px; }
  .cal-nav-btn { border: 1px solid transparent; font-size: 14px; cursor: pointer; padding: 0 5px; border-radius: 3px; height: 22px; display: flex; align-items: center; transition: all 0.12s; }
  .cal-today-btn { border-radius: 3px; font-family: var(--font-serif); font-size: 12px; cursor: pointer; padding: 0 7px; height: 22px; transition: all 0.12s; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; }
  .cal-dow { font-size: 9px; text-transform: uppercase; text-align: center; padding: 2px 0; letter-spacing: 0.04em; }
  .cal-day { display: flex; align-items: center; justify-content: center; border-radius: 50%; width: 22px; height: 22px; margin: auto; font-size: 11px; cursor: pointer; transition: background 0.12s; position: relative; }
  .cal-day.has-blocks::after { content: ''; position: absolute; bottom: 1px; width: 4px; height: 4px; border-radius: 50%; }
  .week-strip { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .week-day-btn { display: flex; flex-direction: column; align-items: center; padding: 4px 0; border-radius: 5px; cursor: pointer; background: transparent; transition: background 0.12s; position: relative; }
  .wday-name { font-size: 9px; text-transform: uppercase; margin-bottom: 1px; }
  .wday-num { font-size: 12px; }
  .week-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 1px; }
  .arc-label { font-family: var(--font-serif); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; opacity: 0.5; }
  .arc-bars { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; align-items: end; height: 44px; }
  .arc-col { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; padding: 0; cursor: pointer; border-radius: 3px; height: 100%; justify-content: flex-end; transition: background 0.12s; }
  .arc-bar-track { width: 100%; flex: 1; display: flex; flex-direction: column; justify-content: flex-end; }
  .arc-bar-fill { width: 100%; border-radius: 2px 2px 0 0; transition: height 0.3s; }
  .arc-day-lbl { font-size: 8px; font-weight: 700; text-transform: uppercase; opacity: 0.5; }
  .arc-cnt { font-size: 8px; font-variant-numeric: tabular-nums; opacity: 0.4; }
  .summary-section-title { font-family: var(--font-serif); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; opacity: 0.5; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .stat-lbl { font-size: 12px; }
  .stat-val { font-size: 12px; font-weight: 600; }
  .progress-track { height: 3px; border-radius: 2px; margin-top: 7px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.35s; background: var(--rose); }

  /* ── Tab bar ── */
  .tab-bar { position: absolute; bottom: 5%; left: 8%; z-index: 20; display: flex; gap: 4px; align-items: center; }
  .tab-btn { padding: 4px 14px; border-radius: 7px 7px 0 0; border: 1px solid rgba(180,130,220,0.35); border-bottom: none; background: rgba(40,20,60,0.82); color: rgba(240,230,255,0.88); font-family: var(--font-serif); font-size: 13px; cursor: pointer; transition: all 0.13s; }
  .tab-btn.active { background: rgba(70,30,100,0.95); color: #fff; border-color: rgba(210,160,255,0.75); box-shadow: 0 -2px 8px rgba(180,130,220,0.28); }
  .tab-btn:hover:not(.active) { background: rgba(60,25,80,0.9); color: #fff; }
  .tab-add { font-size: 15px; padding: 2px 9px; }

  /* ── Date header ── */
  .date-header { position: absolute; top: 5.5%; left: 10.5%; z-index: 5; display: flex; align-items: baseline; gap: 12px; }
  .date-title { font-family: var(--font-serif); font-size: 18px; font-weight: 600; }
  .now-badge { font-size: 11px; font-variant-numeric: tabular-nums; color: var(--blue); background: rgba(90,142,252,0.1); border: 1px solid rgba(90,142,252,0.22); padding: 1px 8px; border-radius: 9px; }

  /* ── Writing zone ── */
  .writing-zone { position: absolute; top: 11%; left: 10.5%; width: 75%; height: 72%; z-index: 5; display: flex; flex-direction: column; gap: 0; overflow: hidden; }

  /* ── FOCUS PANEL ── */
  .focus-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(8,3,20,0.72);
    backdrop-filter: blur(8px);
    display: flex; align-items: stretch; justify-content: flex-end;
    animation: fade-in 0.22s ease;
  }
  @keyframes fade-in { from{opacity:0} to{opacity:1} }

  .focus-panel {
    width: min(480px, 100vw);
    height: 100vh;
    display: flex; flex-direction: column;
    background: rgba(12,5,30,0.97);
    border-left: 1px solid rgba(180,130,220,0.22);
    box-shadow: -12px 0 60px rgba(0,0,0,0.5);
    font-family: var(--font-body);
    animation: slide-in 0.24s cubic-bezier(0.22,1,0.36,1);
    overflow: hidden;
  }
  @keyframes slide-in { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }

  .focus-lock-full {
    width: 100vw !important;
    border-left: none !important;
  }

  .focus-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid rgba(180,130,220,0.12);
    flex-shrink: 0;
  }
  .focus-block-color { width: 4px; align-self: stretch; border-radius: 2px; flex-shrink: 0; }
  .focus-block-title { flex: 1; font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: rgba(240,225,255,0.92); line-height: 1.2; }
  .focus-close-btn {
    background: none; border: none; color: rgba(200,170,240,0.45); font-size: 18px;
    cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.12s; line-height: 1;
  }
  .focus-close-btn:hover { color: rgba(240,200,255,0.9); background: rgba(180,130,220,0.12); }

  /* countdown ring */
  .focus-timer-section {
    flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 16px 14px;
    border-bottom: 1px solid rgba(180,130,220,0.1);
    gap: 8px;
    position: relative;
  }
  .focus-ring-wrap { position: relative; width: 96px; height: 96px; }
  .focus-ring-svg { width: 96px; height: 96px; transform: rotate(-90deg); }
  .focus-ring-track { fill: none; stroke: rgba(180,130,220,0.1); stroke-width: 6; }
  .focus-ring-fill  { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.4s; }
  .focus-ring-text  {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .focus-ring-time { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: rgba(240,225,255,0.95); letter-spacing: 0.04em; }
  .focus-ring-sub  { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(200,170,240,0.45); margin-top: 1px; }
  .focus-block-time-range { font-size: 11px; color: rgba(200,170,240,0.5); font-variant-numeric: tabular-nums; }
  .focus-warn-pill {
    font-size: 10px; padding: 2px 10px; border-radius: 10px;
    background: rgba(252,163,36,0.15); border: 1px solid rgba(252,163,36,0.35);
    color: var(--orange); letter-spacing: 0.04em; animation: pulse-warn 1.6s ease-in-out infinite;
  }
  @keyframes pulse-warn { 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* Priority tasks area */
  .focus-tasks-section {
    flex: 1; overflow-y: auto; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: rgba(180,140,220,0.18) transparent;
  }

  .focus-section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .focus-section-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(200,170,240,0.4);
  }

  /* AI breakdown input */
  .focus-ai-row {
    display: flex; gap: 6px; align-items: flex-start;
  }
  .focus-ai-input {
    flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(180,130,220,0.2);
    border-radius: 7px; padding: 8px 10px; font-family: var(--font-body); font-size: 13px;
    color: rgba(240,225,255,0.88); outline: none; resize: none;
    transition: border-color 0.15s;
    min-height: 36px; max-height: 80px;
  }
  .focus-ai-input:focus { border-color: rgba(180,130,220,0.45); }
  .focus-ai-input::placeholder { color: rgba(200,170,240,0.3); font-style: italic; }
  .focus-ai-btn {
    padding: 8px 12px; border-radius: 7px; border: 1px solid rgba(45,212,191,0.4);
    background: rgba(45,212,191,0.1); color: var(--teal); font-size: 12px;
    cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
  }
  .focus-ai-btn:hover { background: rgba(45,212,191,0.2); border-color: var(--teal); }
  .focus-ai-btn:disabled { opacity: 0.45; cursor: default; }
  .focus-ai-thinking {
    font-size: 11px; color: rgba(45,212,191,0.6); padding: 4px 0;
    display: flex; align-items: center; gap: 5px;
  }
  .ai-dot { display: inline-block; animation: ai-bounce 1.2s infinite; }
  .ai-dot:nth-child(2) { animation-delay: 0.2s; }
  .ai-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes ai-bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-4px)} }

  /* Task items */
  .focus-task-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 9px 10px; border-radius: 8px;
    border: 1px solid rgba(180,130,220,0.1);
    background: rgba(255,255,255,0.025);
    transition: all 0.15s; cursor: default;
    position: relative;
  }
  .focus-task-item.active-task {
    border-color: rgba(45,212,191,0.4);
    background: rgba(45,212,191,0.05);
    box-shadow: 0 0 0 1px rgba(45,212,191,0.12);
  }
  .focus-task-item.done-task { opacity: 0.32; }
  .focus-task-item.stuck-task { border-color: rgba(252,163,36,0.35); background: rgba(252,163,36,0.04); }

  .focus-task-check {
    width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
    border: 1px solid rgba(181,95,124,0.5); background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 10px; margin-top: 1px;
    transition: all 0.12s;
  }
  .focus-task-check.done { background: rgba(90,142,252,0.3); border-color: var(--blue); color: rgba(200,220,255,0.9); }
  .focus-task-check:hover:not(.done) { border-color: var(--rose); background: rgba(181,95,124,0.1); }

  .focus-task-body { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .focus-task-text {
    font-size: 13px; color: rgba(240,225,255,0.88); line-height: 1.35;
    background: none; border: none; outline: none; width: 100%;
    font-family: var(--font-body); padding: 0; resize: none;
    transition: color 0.12s;
  }
  .focus-task-text.done { text-decoration: line-through; color: rgba(200,170,240,0.35); }
  .focus-task-text::placeholder { color: rgba(200,170,240,0.3); font-style: italic; }

  .focus-task-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

  .priority-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
    padding: 1px 6px; border-radius: 9px; cursor: pointer;
    transition: all 0.12s; border: 1px solid transparent; user-select: none;
    flex-shrink: 0;
  }
  .priority-badge.p1 { background: rgba(253,141,121,0.18); border-color: rgba(253,141,121,0.4); color: var(--peach); }
  .priority-badge.p2 { background: rgba(252,163,36,0.15); border-color: rgba(252,163,36,0.35); color: var(--orange); }
  .priority-badge.p3 { background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.28); color: var(--violet); }

  .stuck-badge {
    font-size: 9px; padding: 1px 6px; border-radius: 9px;
    background: rgba(252,163,36,0.15); border: 1px solid rgba(252,163,36,0.3);
    color: var(--orange); letter-spacing: 0.04em;
  }

  .focus-task-elapsed {
    font-size: 9px; color: rgba(200,170,240,0.35);
    font-variant-numeric: tabular-nums; margin-left: auto;
  }

  .focus-task-del {
    background: none; border: none; font-size: 13px; cursor: pointer;
    color: rgba(200,170,240,0.25); padding: 0 2px; transition: color 0.12s;
    opacity: 0; flex-shrink: 0; align-self: flex-start; margin-top: 1px;
  }
  .focus-task-item:hover .focus-task-del { opacity: 1; }
  .focus-task-del:hover { color: rgba(240,100,120,0.8); }

  /* Add task row */
  .focus-add-row {
    display: flex; align-items: center; gap: 6px;
  }
  .focus-add-input {
    flex: 1; background: rgba(255,255,255,0.03); border: 1px dashed rgba(180,130,220,0.22);
    border-radius: 7px; padding: 7px 10px; font-family: var(--font-body); font-size: 13px;
    color: rgba(240,225,255,0.78); outline: none;
  }
  .focus-add-input:focus { border-color: rgba(181,95,124,0.45); border-style: solid; }
  .focus-add-input::placeholder { color: rgba(200,170,240,0.28); font-style: italic; }

  /* Bottom action bar */
  .focus-footer {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid rgba(180,130,220,0.1);
  }
  .focus-footer-btn {
    flex: 1; padding: 8px 0; border-radius: 7px;
    border: 1px solid rgba(180,130,220,0.2);
    background: rgba(255,255,255,0.04); color: rgba(200,170,240,0.75);
    font-family: var(--font-body); font-size: 12px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .focus-footer-btn:hover { background: rgba(180,130,220,0.12); color: rgba(230,210,255,0.9); }
  .focus-footer-btn.primary {
    background: rgba(45,212,191,0.12); border-color: rgba(45,212,191,0.35);
    color: var(--teal);
  }
  .focus-footer-btn.primary:hover { background: rgba(45,212,191,0.22); }
  .focus-footer-btn.danger {
    background: rgba(181,95,124,0.08); border-color: rgba(181,95,124,0.25);
    color: var(--rose);
  }
  .focus-footer-btn.danger:hover { background: rgba(181,95,124,0.18); }

  /* Focus lock mode banner */
  .focus-lock-banner {
    background: rgba(45,212,191,0.08); border-bottom: 1px solid rgba(45,212,191,0.2);
    padding: 5px 16px; display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .focus-lock-label { font-size: 10px; color: var(--teal); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; }

  /* Progress bar in focus */
  .focus-progress-wrap { padding: 0 16px 10px; flex-shrink: 0; }
  .focus-progress-track { height: 2px; background: rgba(180,130,220,0.1); border-radius: 1px; overflow: hidden; }
  .focus-progress-fill { height: 100%; border-radius: 1px; background: linear-gradient(90deg, var(--rose), var(--blue)); transition: width 0.4s; }
  .focus-progress-label { font-size: 9px; color: rgba(200,170,240,0.4); text-align: right; margin-top: 3px; }

  /* Stuck nudge overlay inside task */
  .stuck-nudge {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 9px; color: var(--orange);
    white-space: nowrap; pointer-events: none;
  }

  /* ── TWEAKS PANEL ── */
  .tweaks-panel {
    position: fixed; bottom: 80px; right: 20px; z-index: 100;
    width: 240px;
    border-radius: 12px;
    padding: 16px;
    font-family: var(--font-body);
    display: flex; flex-direction: column; gap: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(180,130,220,0.25);
    backdrop-filter: blur(16px);
    transition: opacity 0.2s, transform 0.2s;
  }
  .tweaks-panel.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }
  .tweaks-title {
    font-family: var(--font-serif); font-size: 13px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .tweaks-close {
    background: none; border: none; cursor: pointer;
    font-size: 16px; line-height: 1; opacity: 0.5; transition: opacity 0.12s;
  }
  .tweaks-close:hover { opacity: 1; }
  .tweak-group { display: flex; flex-direction: column; gap: 7px; }
  .tweak-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55; }
  .tweak-options { display: flex; gap: 4px; }
  .tweak-opt {
    flex: 1; padding: 5px 0; border-radius: 6px; border: 1px solid transparent;
    font-family: var(--font-body); font-size: 12px; cursor: pointer;
    text-align: center; transition: all 0.15s;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── helpers ── */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const pad = n => String(n).padStart(2,'0');
const toMins = t => { const [h,m] = t.split(':').map(Number); return h*60+(m||0); };
const toTime = m => { m=Math.max(0,Math.min(23*60+59,m)); return `${pad(Math.floor(m/60))}:${pad(m%60)}`; };
const nowMins = () => { const n=new Date(); return n.getHours()*60+n.getMinutes(); };
const fmtTime12 = t => { const [h,m]=t.split(':').map(Number); return `${h%12||12}:${pad(m)} ${h<12?'AM':'PM'}`; };
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayKey = () => dateKey(new Date());
const parseKey = k => { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); };
const fmtLongDate = k => parseKey(k).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
const fmtDOW = k => parseKey(k).toLocaleDateString('en-US',{weekday:'short'});

const COLORS = ['plum','rose','peach','orange','yellow','blue','teal','violet'];
const COLOR_HEX = { plum:'#661A4E',rose:'#B55F7C',peach:'#FD8D79',orange:'#FCA324',yellow:'#FCCD38',blue:'#5A8EFC',teal:'#2dd4bf',violet:'#a78bfa' };
const DURATIONS = [{label:'15m',mins:15},{label:'30m',mins:30},{label:'45m',mins:45},{label:'1h',mins:60},{label:'90m',mins:90},{label:'2h',mins:120},{label:'3h',mins:180}];
const DOW = ['S','M','T','W','T','F','S'];

const LS_KEY = 'timeblocking_blocks_v1';
const LS_ALLDAY = 'timeblocking_allday_v1';
const LS_TWEAKS = 'timeblocking_tweaks_v1';
const loadBlocks = () => { try { return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); } catch { return {}; }};
const saveBlocks = b => localStorage.setItem(LS_KEY, JSON.stringify(b));
const loadAllDay = () => { try { return JSON.parse(localStorage.getItem(LS_ALLDAY)||'{}'); } catch { return {}; }};
const saveAllDay = a => localStorage.setItem(LS_ALLDAY, JSON.stringify(a));

/* ═══════════════════════════════════════
   TWEAK SYSTEM
   Three high-level controls that each touch
   multiple properties simultaneously.

   1. DENSITY   — airy / focused / packed
      Controls px/min ratio, block font size,
      whether notes show by default, and
      how many hours of the day are visible.

   2. SURFACE MOOD — parchment / glass / ink
      Shifts the entire color temperature:
      warm cream tones / frosted purple-white /
      deep dark mode with inverted text.

   3. BLOCK ANATOMY — minimal / structured / rich
      minimal:    title + time only, everything else on hover
      structured: title + notes always visible
      rich:       title + notes + tasks always expanded,
                  color strip always shown
═══════════════════════════════════════ */

const DEFAULT_TWEAKS = /*EDITMODE-BEGIN*/{
  "density": "packed",
  "mood": "ink",
  "anatomy": "rich"
}/*EDITMODE-END*/;

const DENSITY_CONFIG = {
  airy:    { pxPerMin: 2.4, titleSize: 17, compactThresh: 20, label: 'Airy' },
  focused: { pxPerMin: 1.6, titleSize: 15, compactThresh: 28, label: 'Focused' },
  packed:  { pxPerMin: 0.9, titleSize: 13, compactThresh: 40, label: 'Packed' },
};

const MOOD_CONFIG = {
  parchment: {
    label: 'Parchment',
    writingZoneBg: 'rgba(252,248,238,0.92)',
    timelineBg: 'rgba(252,248,238,0.88)',
    gutterBg: 'rgba(245,238,220,0.6)',
    blockBgMult: 0.12,
    blockBorderMult: 1.0,
    surfaceBg: 'rgba(252,248,238,0.90)',
    surfaceBorder: 'rgba(160,100,60,0.18)',
    textColor: '#4a2c1a',
    mutedColor: 'rgba(120,70,30,0.6)',
    accentColor: 'rgba(140,80,40,0.5)',
    hourLine: 'rgba(160,100,60,0.1)',
    halfTick: 'rgba(160,100,60,0.07)',
    tweaksBg: 'rgba(252,248,238,0.97)',
    tweaksBorder: 'rgba(160,100,60,0.2)',
    tweaksText: '#4a2c1a',
    sidebarCardBg: 'rgba(252,248,238,0.88)',
    sidebarCardBorder: 'rgba(160,100,60,0.15)',
    timeGradient: 'linear-gradient(to bottom, rgba(252,200,100,0.025) 0%, rgba(220,140,80,0.02) 50%, rgba(180,120,60,0.018) 100%)',
  },
  glass: {
    label: 'Glass',
    writingZoneBg: 'transparent',
    timelineBg: 'rgba(255,255,255,0.55)',
    gutterBg: 'rgba(255,255,255,0.3)',
    blockBgMult: 0.08,
    blockBorderMult: 1.0,
    surfaceBg: 'rgba(255,255,255,0.72)',
    surfaceBorder: 'rgba(180,130,220,0.25)',
    textColor: '#661A4E',
    mutedColor: 'rgba(102,26,78,0.55)',
    accentColor: 'rgba(45,212,191,0.4)',
    hourLine: 'rgba(180,130,220,0.1)',
    halfTick: 'rgba(180,130,220,0.08)',
    tweaksBg: 'rgba(255,255,255,0.88)',
    tweaksBorder: 'rgba(180,130,220,0.28)',
    tweaksText: '#661A4E',
    sidebarCardBg: 'rgba(255,255,255,0.62)',
    sidebarCardBorder: 'rgba(102,26,78,0.12)',
    timeGradient: 'linear-gradient(to bottom, rgba(252,163,36,0.018) 0%, rgba(181,95,124,0.022) 40%, rgba(90,142,252,0.022) 78%, rgba(60,40,160,0.032) 100%)',
  },
  ink: {
    label: 'Ink',
    writingZoneBg: 'transparent',
    timelineBg: 'rgba(12,6,28,0.82)',
    gutterBg: 'rgba(12,6,28,0.65)',
    blockBgMult: 0.18,
    blockBorderMult: 0.7,
    surfaceBg: 'rgba(18,8,40,0.88)',
    surfaceBorder: 'rgba(180,130,220,0.18)',
    textColor: 'rgba(240,225,255,0.92)',
    mutedColor: 'rgba(200,170,240,0.45)',
    accentColor: 'rgba(45,212,191,0.35)',
    hourLine: 'rgba(180,130,220,0.08)',
    halfTick: 'rgba(180,130,220,0.05)',
    tweaksBg: 'rgba(18,8,40,0.97)',
    tweaksBorder: 'rgba(180,130,220,0.22)',
    tweaksText: 'rgba(240,225,255,0.9)',
    sidebarCardBg: 'rgba(18,8,40,0.82)',
    sidebarCardBorder: 'rgba(180,130,220,0.14)',
    timeGradient: 'linear-gradient(to bottom, rgba(90,60,180,0.04) 0%, rgba(60,30,120,0.06) 50%, rgba(30,15,80,0.08) 100%)',
  },
};

const ANATOMY_CONFIG = {
  minimal:    { label: 'Minimal',    showNotes: false, showTasks: false, colorStripAlways: false },
  structured: { label: 'Structured', showNotes: true,  showTasks: false, colorStripAlways: false },
  rich:       { label: 'Rich',       showNotes: true,  showTasks: true,  colorStripAlways: true  },
};

function getWeekDays(centerKey) {
  const d = parseKey(centerKey); const dow = d.getDay();
  return Array.from({length:7},(_,i)=>{ const dd=new Date(d); dd.setDate(d.getDate()-dow+i); return dateKey(dd); });
}

function getMonthDays(year, month) {
  const first=new Date(year,month,1), startDow=first.getDay();
  const daysInMonth=new Date(year,month+1,0).getDate(), daysInPrev=new Date(year,month,0).getDate();
  const cells=[];
  for(let i=startDow-1;i>=0;i--) cells.push({day:daysInPrev-i,thisMonth:false,date:new Date(year,month-1,daysInPrev-i)});
  for(let d=1;d<=daysInMonth;d++) cells.push({day:d,thisMonth:true,date:new Date(year,month,d)});
  while(cells.length<42) cells.push({day:cells.length-daysInMonth-startDow+1,thisMonth:false,date:new Date(year,month+1,cells.length-daysInMonth-startDow+1)});
  return cells;
}

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
function App() {
  /* ── Tweaks state ── */
  const [tweaks, setTweaksRaw] = useState(() => {
    try { return {...DEFAULT_TWEAKS, ...JSON.parse(localStorage.getItem(LS_TWEAKS)||'{}')}; }
    catch { return DEFAULT_TWEAKS; }
  });
  const [tweaksVisible, setTweaksVisible] = useState(false);

  const setTweak = (key, val) => setTweaksRaw(prev => {
    const next = {...prev, [key]: val};
    localStorage.setItem(LS_TWEAKS, JSON.stringify(next));
    window.parent?.postMessage({type:'__edit_mode_set_keys', edits: next}, '*');
    return next;
  });

  /* Tweaks panel host protocol */
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent?.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  /* Resolved config from tweaks */
  const density = DENSITY_CONFIG[tweaks.density] || DENSITY_CONFIG.focused;
  const mood    = MOOD_CONFIG[tweaks.mood]       || MOOD_CONFIG.glass;
  const anatomy = ANATOMY_CONFIG[tweaks.anatomy] || ANATOMY_CONFIG.structured;

  const PX_PER_MIN = density.pxPerMin;
  const HOUR_PX    = PX_PER_MIN * 60;
  const DAY_START  = 5;
  const DAY_END    = 23;
  const TOTAL_HRS  = DAY_END - DAY_START;
  const TOTAL_PX   = TOTAL_HRS * HOUR_PX;

  /* ── App state ── */
  const [allBlocksMap, setAllBlocksMap] = useState(() => loadBlocks());
  const [allDayMap, setAllDayMap]       = useState(() => loadAllDay());
  const [currentDate, setCurrentDate]   = useState(() => localStorage.getItem('tb_current_date') || todayKey());
  const [currentMins, setCurrentMins]   = useState(nowMins);
  const [quickInput, setQuickInput]     = useState('');
  const [quickDuration, setQuickDuration] = useState(60);
  const [quickStartTime, setQuickStartTime] = useState(() => toTime(nowMins()));
  const [alldayInput, setAlldayInput]   = useState('');
  const [calViewDate, setCalViewDate]   = useState(() => { const n=new Date(); return {year:n.getFullYear(),month:n.getMonth()}; });
  const [focusBlockId, setFocusBlockId] = useState(null);
  const scrollRef    = useRef(null);
  const gutterRef    = useRef(null);
  const quickRef     = useRef(null);

  useEffect(() => { saveBlocks(allBlocksMap); }, [allBlocksMap]);
  useEffect(() => { saveAllDay(allDayMap); },  [allDayMap]);
  useEffect(() => { localStorage.setItem('tb_current_date', currentDate); }, [currentDate]);

  useEffect(() => {
    const t = setInterval(() => setCurrentMins(nowMins()), 10000);
    return () => clearInterval(t);
  }, []);

  /* Scroll to now */
  useEffect(() => {
    if (!scrollRef.current) return;
    const nowPx = (currentMins - DAY_START*60) * PX_PER_MIN;
    scrollRef.current.scrollTop = Math.max(0, nowPx - 60);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  /* Re-scroll when density changes */
  useEffect(() => {
    if (!scrollRef.current) return;
    const nowPx = (currentMins - DAY_START*60) * PX_PER_MIN;
    scrollRef.current.scrollTop = Math.max(0, nowPx - 80);
  }, [tweaks.density]);

  const syncGutter = () => {
    if (gutterRef.current && scrollRef.current)
      gutterRef.current.scrollTop = scrollRef.current.scrollTop;
  };

  const blocks = allBlocksMap[currentDate] || [];
  const setBlocks = useCallback(fn => {
    setAllBlocksMap(prev => {
      const cur = prev[currentDate]||[];
      return {...prev, [currentDate]: typeof fn==='function' ? fn(cur) : fn};
    });
  }, [currentDate]);

  const alldayItems = allDayMap[currentDate] || [];
  const setAlldayItems = useCallback(fn => {
    setAllDayMap(prev => {
      const cur = prev[currentDate]||[];
      return {...prev, [currentDate]: typeof fn==='function' ? fn(cur) : fn};
    });
  }, [currentDate]);

  const quickEndStr = toTime(toMins(quickStartTime) + quickDuration);

  const addBlock = useCallback((label) => {
    const endTime = toTime(toMins(quickStartTime) + quickDuration);
    setBlocks(prev => [...prev, {id:uid(),label,notes:'',startTime:quickStartTime,endTime,color:'rose',completed:false,tasks:[]}]
      .sort((a,b)=>toMins(a.startTime)-toMins(b.startTime)));
    setQuickStartTime(endTime);
  }, [quickStartTime, quickDuration, setBlocks]);

  const handleQuickAdd = e => {
    e.preventDefault();
    if (!quickInput.trim()) return;
    addBlock(quickInput.trim());
    setQuickInput('');
    quickRef.current?.focus();
  };

  const handleAlldayAdd = e => {
    e.preventDefault();
    if (!alldayInput.trim()) return;
    setAlldayItems(prev => [...prev, {id:uid(),label:alldayInput.trim()}]);
    setAlldayInput('');
  };

  const updateBlock = useCallback((id, changes) => setBlocks(prev => prev.map(b=>b.id===id?{...b,...changes}:b)), [setBlocks]);
  const deleteBlock = useCallback(id => setBlocks(prev => prev.filter(b=>b.id!==id)), [setBlocks]);

  const isToday   = currentDate === todayKey();
  const weekDays  = getWeekDays(currentDate);
  const weekStats = weekDays.map(d => {
    const bs=allBlocksMap[d]||[]; const total=bs.length, done=bs.filter(b=>b.completed).length;
    return {day:d,total,done,ratio:total>0?done/total:0};
  });
  const weekMax   = Math.max(1,...weekStats.map(s=>s.total));
  const weekBlockCounts = Object.fromEntries(weekDays.map(d=>[d,(allBlocksMap[d]||[]).length]));

  const goPrevWeek = () => { const d=parseKey(currentDate); d.setDate(d.getDate()-7); setCurrentDate(dateKey(d)); };
  const goNextWeek = () => { const d=parseKey(currentDate); d.setDate(d.getDate()+7); setCurrentDate(dateKey(d)); };

  const totalBlocks = blocks.length;
  const completedBlocks = blocks.filter(b=>b.completed).length;
  const pct = totalBlocks>0?Math.round(completedBlocks/totalBlocks*100):0;
  const totalMins = blocks.reduce((s,b)=>s+Math.max(0,toMins(b.endTime)-toMins(b.startTime)),0);
  const firstBlock = blocks.length>0 ? [...blocks].sort((a,b)=>toMins(a.startTime)-toMins(b.startTime))[0] : null;

  const nowStr = `${pad(Math.floor(currentMins/60))}:${pad(currentMins%60)}`;

  const monthCells = getMonthDays(calViewDate.year, calViewDate.month);
  const goPrevMonth = () => setCalViewDate(p=>{ let {year,month}=p; month--; if(month<0){month=11;year--;} return {year,month}; });
  const goNextMonth = () => setCalViewDate(p=>{ let {year,month}=p; month++; if(month>11){month=0;year++;} return {year,month}; });
  const calMonthLabel = new Date(calViewDate.year,calViewDate.month,1).toLocaleDateString('en-US',{month:'short',year:'numeric'});

  /* ── Block color helpers that respect mood ── */
  const blockBg = (color, alpha) => {
    const hex = COLOR_HEX[color] || '#661A4E';
    // parse hex to rgb
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    const a = alpha * mood.blockBgMult / 0.08;
    return `rgba(${r},${g},${b},${a})`;
  };

  /* Shared ink-mode text color */
  const tc = mood.textColor;
  const mc = mood.mutedColor;

  return (
    <div style={{position:'relative',width:'100vw',height:'100vh',overflow:'hidden'}}>
      <img className="app-frame" src="assets/frame_blue_orchid.png" alt="" />

      {/* Date header */}
      <div className="date-header">
        <span className="date-title" style={{color:tc}}>{fmtLongDate(currentDate)}</span>
        {isToday && <span className="now-badge">now {nowStr}</span>}
      </div>

      {/* Writing zone */}
      <div className="writing-zone">

        {/* Quick-add bar */}
        <form className="quick-add" onSubmit={handleQuickAdd}
          style={{background:mood.surfaceBg, border:`1px solid ${mood.surfaceBorder}`, fontFamily: tweaks.density==='packed'?'var(--font-body)':'var(--font-body)'}}>
          <div className="quick-add-row1">
            <input ref={quickRef} className="quick-add-input"
              value={quickInput} onChange={e=>setQuickInput(e.target.value)}
              placeholder="block name… or '9am meeting'"
              style={{color:mc, fontFamily:'var(--font-body)'}} />
            <span className="quick-add-start-label" style={{color:mc}}>start</span>
            <div className="quick-add-time">
              <input type="time" className="quick-add-time-input" value={quickStartTime}
                onChange={e=>setQuickStartTime(e.target.value)}
                style={{background:tweaks.mood==='ink'?'rgba(255,255,255,0.07)':'rgba(20,8,50,0.08)', border:`1px solid ${mood.accentColor}`, color:tc, fontFamily:'var(--font-body)'}} />
              <button type="button" className="quick-add-now-btn"
                onClick={()=>setQuickStartTime(toTime(nowMins()))}
                style={{background:tweaks.mood==='ink'?'rgba(255,255,255,0.07)':'rgba(20,8,50,0.08)', border:`1px solid ${mood.surfaceBorder}`, color:tc, fontFamily:'var(--font-body)'}}>now</button>
            </div>
          </div>

            style={{background:mood.timeGradient}}>
            <div style={{position:'relative',height:TOTAL_PX+'px',minHeight:'100%'}}>
              {/* Grid lines */}

                  <div className="hour-row" style={{top:i*HOUR_PX+'px', borderTop:`1px solid ${mood.hourLine}`}} />

              const isActive=d===currentDate, isTodayD=d===todayKey(), hasB=weekBlockCounts[d]>0;
              return (
                <div key={d} className={`week-day-btn ${isActive?'active':''} ${isTodayD?'today-cell':''}`}
                  onClick={()=>setCurrentDate(d)}
                  style={{background:isActive?'rgba(90,142,252,0.12)':'transparent'}}>
                  <span className="wday-name" style={{color:'var(--rose)'}}>{fmtDOW(d).charAt(0)}</span>

          </div>
          <div className="arc-label" style={{color:tc}}>this week</div>
          <div className="arc-bars">
            {weekStats.map(({day,total,done,ratio})=>{
              const isActiveD=day===currentDate, isTodayD=day===todayKey();
              const barH=total===0?0:Math.max(12,Math.round((total/weekMax)*100));
              const barColor=total===0?'rgba(102,26,78,0.1)':ratio>=1?'rgba(90,142,252,0.7)':ratio>=0.5?'rgba(181,95,124,0.65)':'rgba(181,95,124,0.32)';
              return (

                </button>

        {/* Stats */}
        <div style={{background:mood.sidebarCardBg,border:`1px solid ${mood.sidebarCardBorder}`,borderRadius:7,padding:'10px'}}>

          <div className="stat-row">
            <span className="stat-lbl" style={{color:'var(--rose)'}}>blocks</span>
            <span className="stat-val" style={{color:tc}}>{completedBlocks} / {totalBlocks} done</span>

          <div className="stat-row">
            <span className="stat-lbl" style={{color:'var(--rose)'}}>scheduled</span>
            <span className="stat-val" style={{color:tc}}>{totalMins===0?'—':`${Math.floor(totalMins/60)>0?Math.floor(totalMins/60)+'h ':''}${totalMins%60>0?totalMins%60+'m':''}`}</span>

          <div className="stat-row">
            <span className="stat-lbl" style={{color:'var(--rose)'}}>first block</span>
            <span className="stat-val" style={{color:tc}}>{firstBlock?fmtTime12(firstBlock.startTime):'—'}</span>
          </div>
          {totalBlocks>0 && (
            <>
              <div className="progress-track" style={{background:tweaks.mood==='ink'?'rgba(181,95,124,0.15)':'rgba(181,95,124,0.18)'}}>
                <div className="progress-fill" style={{width:pct+'%'}} />
              </div>
              <div style={{fontSize:11,color:'var(--rose)',textAlign:'right',marginTop:3}}>{pct}% complete</div>
            </>
          )}
        </div>
      </div>

      {/* ── Tab bar ── */}
      <div className="tab-bar">
        {[{icon:'✅',label:'to-do'},{icon:'📝',label:'Notes'},{icon:'📅',label:'Plans',active:true},{icon:'🔄',label:"Changin'"},{icon:'📊',label:'progression'},{icon:'⏱',label:'Timer'}].map(t=>(
          <button key={t.label} className={`tab-btn ${t.active?'active':''}`}>{t.icon} {t.label}</button>

        <button className="tab-btn tab-add">+</button>
      </div>

      {/* ── TWEAKS PANEL ── */}
      <TweaksPanel
        tweaks={tweaks} setTweak={setTweak}
        visible={tweaksVisible} onClose={()=>{setTweaksVisible(false); window.parent?.postMessage({type:'__edit_mode_dismissed'},'*');}}
        mood={mood}
      />

      {/* ── FOCUS PANEL ── */}
      {focusBlockId && (() => {
        const focusBlock = blocks.find(b => b.id === focusBlockId);
        if (!focusBlock) return null;
        return (
          <FocusPanel
            block={focusBlock}
            currentMins={currentMins}

        );

    </div>
  );
}

      id: 'density',

      desc: 'How much of the day fits in view',

        { val:'airy',    label:'Airy',    sub:'spacious' },

        { val:'ink',       label:'Ink',       sub:'dark'       },

      id: 'anatomy',
      label: 'Block anatomy',

          </div>
          <div className="tweak-options">
            {g.options.map(opt=>{

/* ══════════════════════════════════════════
   TIME BLOCK
══════════════════════════════════════════ */
function TimeBlock({ block, currentMins, isToday, mood, anatomy, density, PX_PER_MIN, DAY_START, onUpdate, onDelete, onFocus }) {
  const startMins = toMins(block.startTime);
  const endMins   = toMins(block.endTime);
  const duration  = Math.max(15, endMins - startMins);
  const top       = (startMins - DAY_START*60) * PX_PER_MIN;
  const height    = Math.max(38, duration * PX_PER_MIN);
  const isCurrent = isToday && currentMins>=startMins && currentMins<endMins;
  const isCompact = duration < density.compactThresh;

  /* anatomy controls */
  const showNotes = !isCompact && anatomy.showNotes;
  const showTasks = !isCompact && anatomy.showTasks;
  const colorAlways = anatomy.colorStripAlways;

  const tc = mood.textColor;
  const mc = mood.mutedColor;

  /* Per-color block bg */
  const hexMap = {plum:'102,26,78',rose:'181,95,124',peach:'253,141,121',orange:'252,163,36',yellow:'252,205,56',blue:'90,142,252',teal:'45,212,191',violet:'167,139,250'};
  const rgb = hexMap[block.color] || '181,95,124';
  const alpha = mood.blockBgMult;
  const blockBgStr = `rgba(${rgb},${alpha})`;
  const blockBorderStr = COLOR_HEX[block.color] || '#B55F7C';

  /* Time edit bg in ink mode */
  const timeEditStyle = {
    background: mood === MOOD_CONFIG.ink ? 'rgba(255,255,255,0.06)' : 'rgba(20,8,50,0.07)',
    border: '1px solid rgba(90,142,252,0.22)',
    color: 'rgba(90,142,252,0.9)',
    fontFamily: 'var(--font-body)',
  };

  const addTask = () => onUpdate({tasks:[...(block.tasks||[]),{id:uid(),content:'',completed:false}]});
  const updateTask = (tid,ch) => onUpdate({tasks:(block.tasks||[]).map(t=>t.id===tid?{...t,...ch}:t)});
  const deleteTask = tid => onUpdate({tasks:(block.tasks||[]).filter(t=>t.id!==tid)});
  const autoResizeNotes = e => {
    e.target.style.height='auto'; e.target.style.height=e.target.scrollHeight+'px';
    onUpdate({notes:e.target.value});
  };

  return (
    <div className={`tblock ${block.completed?'completed':''} ${isCurrent?'current':''}`}
      style={{
        position:'absolute', top:Math.max(0,top)+'px', height:height+'px', left:'4px', right:'8px',
        borderLeftColor: blockBorderStr, background: blockBgStr,
        boxShadow: isCurrent ? '0 0 0 1px rgba(90,142,252,0.3), 0 2px 12px rgba(90,142,252,0.08)' : 'none',
      }}>

      {/* Time row */}
      <div className="tblock-time">
        <input type="time" className="tblock-time-edit" value={block.startTime}
          onChange={e=>onUpdate({startTime:e.target.value})} style={timeEditStyle} />
        <span style={{opacity:0.4,color:tc}}>–</span>
        <input type="time" className="tblock-time-edit" value={block.endTime}
          onChange={e=>onUpdate({endTime:e.target.value})} style={timeEditStyle} />
        {isCurrent && <span className="tblock-now-badge">● now</span>}
      </div>

      {/* Title */}
      <input type="text" className="tblock-title"
        value={block.label} placeholder="Block title…"
        onChange={e=>onUpdate({label:e.target.value})}
        style={{color:tc, fontSize:isCompact?Math.max(11,density.titleSize-2)+'px':density.titleSize+'px'}} />

      {/* Notes */}
      {showNotes && (
        <textarea className="tblock-notes" value={block.notes} placeholder="Notes…" rows={1}
          onChange={autoResizeNotes} style={{color:mc}} />
      )}

      {/* Tasks */}
      {showTasks && (block.tasks||[]).length > 0 && (
        <div className="tblock-tasks">
          {(block.tasks||[]).map(task=>(
            <div key={task.id} className="tblock-task-row">
              <button className={`tblock-check ${task.completed?'done':''}`}
                onClick={()=>updateTask(task.id,{completed:!task.completed})}
                style={{border:`1px solid rgba(181,95,124,0.4)`,color:task.completed?tc:'transparent'}}>
                {task.completed?'✓':''}
              </button>
              <input type="text" className={`tblock-task-input ${task.completed?'done':''}`}
                value={task.content} placeholder="Subtask…"
                onChange={e=>updateTask(task.id,{content:e.target.value})}
                style={{color:tc}} />
              <button className="tblock-task-del" onClick={()=>deleteTask(task.id)} style={{color:mc}}>×</button>
            </div>
          ))}
        </div>
      )}

      {/* Add subtask (always available in rich mode or on hover when structured) */}
      {!isCompact && height>80 && (anatomy.showTasks || anatomy.showNotes) && (
        <button className="tblock-add-task" onClick={addTask}
          style={{color:mc}}>+ subtask</button>
      )}

      {/* Color strip */}
      <div className="color-strip" style={colorAlways?{maxHeight:'18px',opacity:1}:{}}>
        {COLORS.map(c=>(
          <div key={c} className={`cdot ${block.color===c?'active':''}`}
            style={{background:COLOR_HEX[c]}}
            onClick={()=>onUpdate({color:c})} />
        ))}
      </div>

      {/* Actions */}
      <div className="tblock-actions">
        <button className="tblock-action"
          onClick={onFocus}
          style={{color:'var(--teal)', fontSize:11, padding:'1px 5px', borderRadius:3, background:'rgba(45,212,191,0.08)', border:'1px solid rgba(45,212,191,0.25)'}}
          title="Open Focus Mode">⚡ focus</button>
        <button className="tblock-action mark"
          onClick={()=>onUpdate({completed:!block.completed})}
          style={{color:'var(--blue)'}}
          title={block.completed?'Mark incomplete':'Mark done'}>✓</button>
        <button className="tblock-action del"
          onClick={onDelete} style={{color:'var(--rose)'}} title="Delete block">×</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   FOCUS PANEL
   — Block countdown ring
   — AI task breakdown (Claude)
   — Priority badges (P1/P2/P3, cycling)
   — Active task spotlight + elapsed timer
   — Stuck alert (> stuckThresh minutes on one task)
   — Focus lock (full-screen, hides rest of UI)
══════════════════════════════════════════ */
const STUCK_THRESH_MINS = 12; // nudge if on same task this many minutes
const LS_FOCUS = 'timeblocking_focus_v1';

function loadFocusData() {
  try { return JSON.parse(localStorage.getItem(LS_FOCUS) || '{}'); } catch { return {}; }
}
function saveFocusData(d) { localStorage.setItem(LS_FOCUS, JSON.stringify(d)); }

function FocusPanel({ block, currentMins, isToday, onUpdate, onClose }) {
  // ── local task list (mirrors block.tasks but enriched with priority + startedAt) ──
  const [tasks, setTasksRaw] = useState(() => {
    const saved = loadFocusData()[block.id] || {};
    const base = (block.tasks || []).map(t => ({
      priority: 'p2',
      startedAt: null,
      ...t,
      ...(saved[t.id] || {}),
    }));
    return base;
  });

  const [aiInput, setAiInput] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState('');
  const [lockMode, setLockMode] = useState(false);
  const [tick, setTick] = useState(0); // force re-render every second
  const [newTaskText, setNewTaskText] = useState('');
  const addInputRef = React.useRef(null);
  const aiInputRef = React.useRef(null);

  // Tick every second for elapsed timers
  useEffect(() => {
    const iv = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(iv);
  }, []);

  // Sync tasks → block.tasks (strip focus-only fields) + save focus data
  const setTasks = useCallback(fn => {
    setTasksRaw(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      // Save enriched data keyed by task id
      const saved = loadFocusData();
      saved[block.id] = {};
      next.forEach(t => { saved[block.id][t.id] = { priority: t.priority, startedAt: t.startedAt }; });
      saveFocusData(saved);
      // Sync stripped tasks back to block
      onUpdate({ tasks: next.map(({ priority, startedAt, ...rest }) => rest) });
      return next;
    });
  }, [block.id, onUpdate]);

  // ── countdown ring ──
  const startMins = toMins(block.startTime);
  const endMins   = toMins(block.endTime);
  const totalBlockMins = Math.max(1, endMins - startMins);
  const elapsedBlockMins = isToday ? Math.max(0, currentMins - startMins) : 0;
  const remainMins = Math.max(0, totalBlockMins - elapsedBlockMins);
  const ringPct = 1 - (remainMins / totalBlockMins);
  const RADIUS = 38;
  const CIRC = 2 * Math.PI * RADIUS;
  const ringOffset = CIRC * (1 - ringPct);
  const ringColor = remainMins <= 5 ? 'var(--orange)' : remainMins <= 15 ? 'var(--yellow)' : 'var(--teal)';

  const fmtRemain = m => {
    if (m <= 0) return '0:00';
    const h = Math.floor(m / 60), mn = m % 60;
    return h > 0 ? `${h}h ${pad(mn)}m` : `${m}m`;
  };

  // ── active task = first non-completed, or null ──
  const activeTask = tasks.find(t => !t.completed) || null;
  const doneCount = tasks.filter(t => t.completed).length;
  const progressPct = tasks.length > 0 ? Math.round((doneCount / tasks.length) * 100) : 0;

  // ── stuck detection ──
  const nowMs = Date.now();
  const isStuck = activeTask && activeTask.startedAt &&
    (nowMs - activeTask.startedAt) > STUCK_THRESH_MINS * 60 * 1000;

  // Auto-set startedAt when a task becomes active
  useEffect(() => {
    if (!activeTask) return;
    if (!activeTask.startedAt) {
      setTasks(prev => prev.map(t =>
        t.id === activeTask.id ? { ...t, startedAt: Date.now() } : t
      ));
    }
  }, [activeTask?.id]);

  // ── helpers ──
  const cyclePriority = id => {
    const cycle = ['p1', 'p2', 'p3'];
    setTasks(prev => prev.map(t =>
      t.id === id ? { ...t, priority: cycle[(cycle.indexOf(t.priority) + 1) % 3] } : t
    ));
  };

  const toggleTask = id => {
    setTasks(prev => {
      const t = prev.find(x => x.id === id);
      const nowActive = !t.completed;
      return prev.map(x =>
        x.id === id
          ? { ...x, completed: nowActive ? false : true, startedAt: nowActive ? null : x.startedAt }
          : x
      );
    });
  };

  const deleteTask = id => setTasks(prev => prev.filter(t => t.id !== id));

  const addTask = text => {
    if (!text.trim()) return;
    const newT = { id: uid(), content: text.trim(), completed: false, priority: 'p2', startedAt: null };
    setTasks(prev => {
      // insert after last p1, before p3s; simple append
      return [...prev, newT];
    });
    setNewTaskText('');
  };

  const skipActiveTask = () => {
    if (!activeTask) return;
    setTasks(prev => prev.map(t =>
      t.id === activeTask.id ? { ...t, startedAt: Date.now() } : t
    ));
  };

  const sortByPriority = () => {
    const order = { p1: 0, p2: 1, p3: 2 };
    setTasks(prev => {
      const incomplete = [...prev.filter(t => !t.completed)].sort((a, b) => order[a.priority] - order[b.priority]);
      const done = prev.filter(t => t.completed);
      return [...incomplete, ...done];
    });
  };

  // ── AI task breakdown ──
  const runAiBreakdown = async () => {
    if (!aiInput.trim()) return;
    setAiLoading(true);
    setAiError('');
    try {
      const prompt = `You are a productivity assistant. Break this task into 4–8 clear, concrete, actionable subtasks. Each subtask should be completable in under 20 minutes. Return ONLY a JSON array of strings, no markdown, no explanation. Task: "${aiInput.trim()}"`;
      const result = await window.claude.complete(prompt);
      // parse JSON array from result
      const match = result.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('Could not parse subtasks');
      const subtasks = JSON.parse(match[0]);
      if (!Array.isArray(subtasks)) throw new Error('Not an array');
      const newTasks = subtasks.map((s, i) => ({
        id: uid(),
        content: String(s).trim(),
        completed: false,
        priority: i === 0 ? 'p1' : i < 3 ? 'p2' : 'p3',
        startedAt: null,
      }));
      setTasks(prev => [...prev, ...newTasks]);
      setAiInput('');
    } catch (e) {
      setAiError('Could not break down — try again or add tasks manually.');
    } finally {
      setAiLoading(false);
    }
  };

  // elapsed label for active task
  const elapsedLabel = t => {
    if (!t.startedAt) return '';
    const secs = Math.floor((Date.now() - t.startedAt) / 1000);
    const m = Math.floor(secs / 60), s = secs % 60;
    return `${m}:${pad(s)}`;
  };

  const colorHex = COLOR_HEX[block.color] || '#B55F7C';

  return (
    <div className="focus-overlay" onClick={e => { if (e.target === e.currentTarget && !lockMode) onClose(); }}>
      <div className={`focus-panel ${lockMode ? 'focus-lock-full' : ''}`}>

        {/* Lock mode banner */}
        {lockMode && (
          <div className="focus-lock-banner">
            <span className="focus-lock-label">⚡ Focus Lock — stay on task</span>
            <button className="focus-close-btn" style={{fontSize:11,color:'var(--teal)'}} onClick={() => setLockMode(false)}>unlock</button>
          </div>
        )}

        {/* Header */}
        <div className="focus-header">
          <div className="focus-block-color" style={{background: colorHex}} />
          <div className="focus-block-title">{block.label || 'Untitled Block'}</div>
          {!lockMode && (
            <button className="focus-close-btn" onClick={onClose} title="Close">×</button>
          )}
        </div>

        {/* Countdown ring */}
        <div className="focus-timer-section">
          <div className="focus-ring-wrap">
            <svg className="focus-ring-svg" viewBox="0 0 96 96">
              <circle className="focus-ring-track" cx="48" cy="48" r={RADIUS} />
              <circle className="focus-ring-fill" cx="48" cy="48" r={RADIUS}
                stroke={ringColor}
                strokeDasharray={CIRC}
                strokeDashoffset={ringOffset} />
            </svg>
            <div className="focus-ring-text">
              <span className="focus-ring-time">{fmtRemain(remainMins)}</span>
              <span className="focus-ring-sub">{remainMins <= 0 ? 'ended' : 'left'}</span>
            </div>
          </div>
          <span className="focus-block-time-range">{fmtTime12(block.startTime)} – {fmtTime12(block.endTime)}</span>
          {remainMins > 0 && remainMins <= 5 && (
            <div className="focus-warn-pill">⚠ wrapping up soon</div>
          )}
          {isStuck && (
            <div className="focus-warn-pill" style={{background:'rgba(252,163,36,0.12)',borderColor:'rgba(252,163,36,0.3)'}}>
              🔄 {Math.floor((Date.now() - activeTask.startedAt) / 60000)}m on this task — consider moving on
            </div>
          )}
        </div>

        {/* Progress bar */}
        {tasks.length > 0 && (
          <div className="focus-progress-wrap">
            <div className="focus-progress-track">
              <div className="focus-progress-fill" style={{width: progressPct + '%'}} />
            </div>
            <div className="focus-progress-label">{doneCount} / {tasks.length} subtasks · {progressPct}%</div>
          </div>
        )}

        {/* Tasks area */}
        <div className="focus-tasks-section">

          {/* AI breakdown */}
          <div>
            <div className="focus-section-header">
              <span className="focus-section-label">Break it down with AI</span>
            </div>
            <div className="focus-ai-row">
              <textarea
                ref={aiInputRef}
                className="focus-ai-input"
                rows={1}
                value={aiInput}
                onChange={e => { setAiInput(e.target.value); e.target.style.height='auto'; e.target.style.height=e.target.scrollHeight+'px'; }}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runAiBreakdown(); } }}
                placeholder="Describe a task to break into subtasks…"
                disabled={aiLoading}
              />
              <button className="focus-ai-btn" onClick={runAiBreakdown} disabled={aiLoading || !aiInput.trim()}>
                {aiLoading ? '…' : '⚡ Break'}
              </button>
            </div>
            {aiLoading && (
              <div className="focus-ai-thinking">
                <span className="ai-dot">·</span>
                <span className="ai-dot">·</span>
                <span className="ai-dot">·</span>
                thinking
              </div>
            )}
            {aiError && (
              <div style={{fontSize:11,color:'var(--rose)',marginTop:4,opacity:0.8}}>{aiError}</div>
            )}
          </div>

          {/* Task list */}
          {tasks.length > 0 && (
            <div>
              <div className="focus-section-header">
                <span className="focus-section-label">Subtasks — one at a time</span>
                <button
                  onClick={sortByPriority}
                  style={{fontSize:9,background:'none',border:'none',color:'rgba(200,170,240,0.4)',cursor:'pointer',padding:'1px 4px',letterSpacing:'0.06em',textTransform:'uppercase'}}>
                  Sort P1→P3
                </button>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {tasks.map((task, idx) => {
                  const isActive = !task.completed && task === activeTask;
                  const elStr = isActive ? elapsedLabel(task) : '';
                  const stuckThis = isActive && isStuck;
                  return (
                    <div key={task.id}
                      className={`focus-task-item ${isActive ? 'active-task' : ''} ${task.completed ? 'done-task' : ''} ${stuckThis ? 'stuck-task' : ''}`}>
                      <button
                        className={`focus-task-check ${task.completed ? 'done' : ''}`}
                        onClick={() => toggleTask(task.id)}>
                        {task.completed ? '✓' : ''}
                      </button>
                      <div className="focus-task-body">
                        <input
                          type="text"
                          className={`focus-task-text ${task.completed ? 'done' : ''}`}
                          value={task.content}
                          placeholder="Task…"
                          onChange={e => setTasks(prev => prev.map(t => t.id === task.id ? {...t, content: e.target.value} : t))}
                        />
                        <div className="focus-task-meta">
                          <span
                            className={`priority-badge ${task.priority}`}
                            onClick={() => cyclePriority(task.id)}
                            title="Click to change priority">
                            {task.priority.toUpperCase()}
                          </span>
                          {stuckThis && <span className="stuck-badge">stuck? →skip</span>}
                          {isActive && elStr && <span className="focus-task-elapsed">{elStr}</span>}
                        </div>
                      </div>
                      <button className="focus-task-del" onClick={() => deleteTask(task.id)}>×</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Manual add */}
          <div className="focus-add-row">
            <input
              ref={addInputRef}
              type="text"
              className="focus-add-input"
              value={newTaskText}
              placeholder="+ add subtask manually…"
              onChange={e => setNewTaskText(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') { addTask(newTaskText); } }}
            />
          </div>

          {/* Empty state */}
          {tasks.length === 0 && !aiLoading && (
            <div style={{textAlign:'center',padding:'20px 0',color:'rgba(200,170,240,0.3)',fontSize:13,fontStyle:'italic',lineHeight:1.5}}>
              No subtasks yet.<br/>
              Use AI to break this down, or add manually above.
            </div>
          )}
        </div>

        {/* Footer */}
        <div className="focus-footer">
          {isStuck && activeTask && (
            <button className="focus-footer-btn" onClick={skipActiveTask} title="Reset stuck timer — still working on this">
              🔄 Reset timer
            </button>
          )}
          <button
            className={`focus-footer-btn ${lockMode ? 'danger' : 'primary'}`}
            onClick={() => setLockMode(l => !l)}>
            {lockMode ? '🔓 Unlock' : '🔒 Focus lock'}
          </button>
          {!lockMode && (
            <button
              className="focus-footer-btn danger"
              onClick={() => { onUpdate({ completed: true }); onClose(); }}>
              ✓ Done
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
